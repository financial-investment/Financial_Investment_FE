name: Fix
description: 버그 및 오류 수정 작업 이슈
title: "[Fix] "
labels: ["fix"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 어떤 문제가 발생하고 있는지 작성해주세요.
      placeholder: 예) 카테고리 생성 후 저장 버튼을 누르면 앱이 종료됩니다.
    validations:
      required: true

  - type: textarea
    id: cause
    attributes:
      label: 원인 분석
      description: 현재 파악한 원인이나 의심되는 원인을 작성해주세요.
      placeholder: 예) Room Entity와 DTO 매핑 과정에서 null 값 처리 누락
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: 수정 내용
      description: 어떻게 수정할 예정인지 작성해주세요.
      placeholder: |
        예)
        - null 예외 처리 추가
        - DTO 변환 로직 수정
        - 저장 로직 테스트 보완
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 내용
      description: 해야 할 작업을 체크리스트 형태로 작성해주세요.
      value: |
        - [ ] 원인 파악
        - [ ] 코드 수정
        - [ ] 테스트 수행
        - [ ] 회귀 테스트 확인
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 사항
      description: 관련 로그, 스크린샷, 에러 메시지, 참고 링크 등을 작성해주세요.
      placeholder: 예) java.lang.IllegalStateException 발생
